<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Prita - Sığınak</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; }
        .chat-input { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
    </style>
</head>
<body>
    <div class="chat-messages" id="chat"></div>
    <div class="chat-input">
        <input type="text" id="in" placeholder="Mesaj yaz...">
        <button onclick="gonder()">Gönder</button>
    </div>

    <script>
        const URL = "https://graduated-passport-prime-buyers.trycloudflare.com/api/chat";
        
        async function gonder() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const text = input.value;
            if(!text) return;
            
            chat.innerHTML += `<p><b>Sen:</b> ${text}</p>`;
            input.value = '';
            
            try {
                const res = await fetch(URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "phi4",
                        messages: [{role: "user", content: text}],
                        stream: false
                    })
                });
                const data = await res.json();
                chat.innerHTML += `<p><b>Prita:</b> ${data.message.content}</p>`;
            } catch(e) {
                chat.innerHTML += `<p style="color:red">HATA: ${e.message}</p>`;
                console.error(e);
            }
        }
    </script>
</body>
</html>
