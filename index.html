<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Prita - Sığınak</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        .prita-badge { text-align: center; padding: 15px; background: #1e293b; border-bottom: 2px solid #38bdf8; font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; }
        .user-message { background-color: #38bdf8; color: #0f172a; align-self: flex-end; }
        .prita-message { background-color: #1e293b; border: 1px solid #334155; align-self: flex-start; }
        .chat-input-area { padding: 20px; background-color: #1e293b; display: flex; gap: 10px; }
        #voiceBtn { padding: 15px 25px; background-color: #ef4444; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        #userInput { flex-grow: 1; padding: 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
    </style>
</head>
<body>

    <div class="prita-badge">PRITA</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <button id="voiceBtn" onclick="sesiBaslat()">🎙️ Konuş</button>
        <input type="text" id="userInput" placeholder="Mesajını yaz veya konuş...">
        <button onclick="mesajGonder()">Gönder</button>
    </div>

    <script>
        // Kamera izni alarak mikrofonun da "izinli" kalmasını sağlıyoruz
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).catch(() => {
            alert("Sığınak protokolü: Kamera ve Mikrofon izni olmadan Prita seni duyamaz!");
        });

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';

        function sesiBaslat() {
            document.getElementById('voiceBtn').innerText = "Dinliyorum...";
            recognition.start();
        }

        recognition.onresult = (event) => {
            const metin = event.results[0][0].transcript;
            document.getElementById('userInput').value = metin;
            document.getElementById('voiceBtn').innerText = "🎙️ Konuş";
            mesajGonder();
        };

        async function mesajGonder() {
            const input = document.getElementById('userInput');
            const text = input.value;
            if(!text) return;
            
            const div = document.createElement('div');
            div.className = 'message user-message';
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            input.value = '';

            const res = await fetch("http://127.0.0.1:1234/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{role: "system", content: "Sen Prita, Almanca cevap ver."}, {role: "user", content: text}]
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;

            const replyDiv = document.createElement('div');
            replyDiv.className = 'message prita-message';
            replyDiv.innerText = reply;
            document.getElementById('chatMessages').appendChild(replyDiv);
            
            const ut = new SpeechSynthesisUtterance(reply);
            ut.lang = 'de-DE';
            window.speechSynthesis.speak(ut);
        }
    </script>
</body>
</html>
