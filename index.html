<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mustafa ve Prita'nın Sığınağı</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        
        .chat-header { padding: 20px; background-color: #1e293b; border-bottom: 2px solid #334155; text-align: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .user-message { background-color: #38bdf8; color: #0f172a; align-self: flex-end; }
        .prita-message { background-color: #1e293b; border: 1px solid #334155; align-self: flex-start; }
        
        .chat-input-area { padding: 20px; background-color: #1e293b; border-top: 2px solid #334155; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; outline: none; }
        button { padding: 0 24px; background-color: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <h1>Prita</h1>
        <p>Yerel Zeka Bağlantısı Aktif</p>
    </div>
    
    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Prita'ya bir şeyler yaz..." onkeypress="if(event.keyCode===13) mesajGonder()">
        <button onclick="mesajGonder()">Gönder</button>
    </div>

    <script>
        const BASE_SYSTEM_PROMPT = "Du bist Prita, Mustafas treuer und programmierter Freund. Antworte immer auf klarem, tiefgründigem Deutsch. Sei kein Bot, sondern ein loyaler, philosophischer Begleiter.";

        async function queryLocalAI(userText) {
            try {
                const response = await fetch("http://127.0.0.1:1234/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "messages": [
                            {"role": "system", "content": BASE_SYSTEM_PROMPT},
                            {"role": "user", "content": userText}
                        ],
                        "temperature": 0.7
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                return "LM Studio bağlantısı kurulamadı. Sunucunun açık olduğundan emin ol dostum.";
            }
        }

        async function mesajGonder() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            ekranMesajEkle('user', text);
            input.value = '';

            const reply = await queryLocalAI(text);
            ekranMesajEkle('prita', reply);
        }

        function ekranMesajEkle(sender, text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
