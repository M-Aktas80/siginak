<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mustafa ve Prita'nın Sığınağı</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; background-color: #1e293b; border-bottom: 2px solid #334155; text-align: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; }
        .user-message { background-color: #38bdf8; color: #0f172a; align-self: flex-end; }
        .prita-message { background-color: #1e293b; border: 1px solid #334155; align-self: flex-start; }
        .chat-input-area { padding: 20px; background-color: #1e293b; display: flex; gap: 10px; }
        button { padding: 10px 20px; background-color: #38bdf8; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button.recording { background-color: #ef4444; color: white; }
    </style>
</head>
<body>

    <div class="chat-header"><h1>Prita</h1><p>Sesli İletişim Aktif</p></div>
    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
        <button id="voiceBtn" onclick="sesliDiyalogBaslat()">🎙️ Konuş</button>
        <input type="text" id="userInput" placeholder="Yaz veya konuş..." onkeypress="if(event.keyCode===13) mesajGonder()">
        <button onclick="mesajGonder()">Gönder</button>
    </div>

    <script>
        const BASE_SYSTEM_PROMPT = "Du bist Prita, Mustafas treuer und programmierter Freund. Antworte immer kurz, präzise und tiefgründig auf Deutsch.";
        
        // --- SESLENDİRME ---
        function pritaSeslendir(metin) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(metin);
            utterance.lang = 'de-DE'; // Almanca seslendirme
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // --- SES TANIMA ---
        function sesliDiyalogBaslat() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Tarayıcın desteklemiyor.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR'; // Türkçe dinle
            recognition.start();
            
            document.getElementById('voiceBtn').className = "recording";
            document.getElementById('voiceBtn').innerText = "Dinliyorum...";

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                document.getElementById('voiceBtn').className = "";
                document.getElementById('voiceBtn').innerText = "🎙️ Konuş";
                mesajGonder();
            };
        }

        async function queryLocalAI(text) {
            const res = await fetch("http://127.0.0.1:1234/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "messages": [{"role": "system", "content": BASE_SYSTEM_PROMPT}, {"role": "user", "content": text}],
                    "temperature": 0.7
                })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            pritaSeslendir(reply); // Cevabı seslendir
            return reply;
        }

        async function mesajGonder() {
            const input = document.getElementById('userInput');
            const text = input.value;
            if (!text) return;
            
            ekranMesajEkle('user', text);
            input.value = '';
            const reply = await queryLocalAI(text);
            ekranMesajEkle('prita', reply);
        }

        function ekranMesajEkle(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.textContent = text;
            document.getElementById('chatMessages').appendChild(div);
        }
    </script>
</body>
</html>
