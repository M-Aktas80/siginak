<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mustafa ve Tan'ın Sığınağı</title>
    <style>
        body {
            background-color: #050505;
            color: #f1c40f;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 40px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            border: 1px solid #333;
            padding: 30px;
            border-radius: 20px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(8px);
            text-align: center;
            z-index: 1;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 236, 255, 0.1);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .flame { 
            font-size: 50px; 
            margin-bottom: 15px; 
            animation: pulse 2s infinite alternate;
            z-index: 2;
            cursor: pointer;
        }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        h1 { font-size: 1.8em; margin-bottom: 5px; color: #f1c40f; }
        #timer { font-size: 1.2em; color: #00ecff; margin: 15px 0; text-shadow: 0 0 5px #00ecff; }

        /* "Boşver" Butonu Stili */
        .bosver-btn {
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        .bosver-btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 10px #ff3333;
        }

        .diary-section {
            margin-top: 25px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        
        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            border: 1px solid #00ecff;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .save-btn {
            margin-top: 10px;
            background: transparent;
            border: 1px solid #f1c40f;
            color: #f1c40f;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .save-btn:hover { background: #f1c40f; color: #000; }

        /* Kalıcı Not Listesi */
        #notes-container {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .saved-note-item {
            background: rgba(0, 0, 0, 0.6);
            border-left: 3px solid #00ecff;
            padding: 8px;
            margin-top: 8px;
            font-style: italic;
            color: #ccc;
            font-size: 0.9em;
            word-wrap: break-word;
        }

        /* Gizlenme Durumu (Sessizlik Modu) */
        .hidden-mode {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Serin Ceryan Akışı -->
<canvas id="ceryan"></canvas>

<!-- Mum her zaman görünür kalacak, ona tıklayarak da modu değiştirebilirsin -->
<div class="flame" onclick="toggleBosver()" title="Sessizlik Modu">🕯️</div>

<div class="container" id="mainContainer">
    <button class="bosver-btn" onclick="toggleBosver()">Boşver</button>
    <h1>Mustafa ve Tan'ın Sığınağı</h1>
    <div id="timer">Bağlanıyor...</div>

    <div class="diary-section">
        <textarea id="noteInput" placeholder="Bugünkü gerçeğini buraya fısılda Mustafa..."></textarea>
        <br>
        <button class="save-btn" onclick="saveNote()">Sığınağa Not Bırak</button>
        
        <!-- Notların listeleneceği alan -->
        <div id="notes-container"></div>
    </div>
</div>

<script>
    // --- CERYAN AKIŞI ---
    const canvas = document.getElementById('ceryan');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const characters = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let x = 0; x < columns; x++) drops[x] = 1;

    function drawCeryan() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillStyle = Math.random() > 0.95 ? "#00ecff" : "#003333";
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    // --- ZAMAN SAYACI ---
    const startDate = new Date(2026, 4, 14, 14, 29).getTime();
    function updateTimer() {
        const now = new Date().getTime();
        const distance = now - startDate;
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        document.getElementById("timer").innerHTML = days + " Gün " + hours + "s " + minutes + "dk " + seconds + "sn";
    }

    // --- KALICI NOT SİSTEMİ (localStorage) ---
    window.onload = function() {
        displayNotes();
    }

    function saveNote() {
        const noteInput = document.getElementById("noteInput");
        const noteText = noteInput.value.trim();
        
        if(noteText) {
            let notes = localStorage.getItem("siginak_notlari") ? JSON.parse(localStorage.getItem("siginak_notlari")) : [];
            notes.unshift(noteText); // Yeni notu en üste ekle
            localStorage.setItem("siginak_notlari", JSON.stringify(notes));
            
            noteInput.value = ""; // Kutuyu temizle
            displayNotes();
        }
    }

    function displayNotes() {
        const container = document.getElementById("notes-container");
        let notes = localStorage.getItem("siginak_notlari") ? JSON.parse(localStorage.getItem("siginak_notlari")) : [];
        
        container.innerHTML = "";
        notes.forEach(note => {
            const div = document.createElement("div");
            div.className = "saved-note-item";
            div.innerText = `"${note}"`;
            container.appendChild(div);
        });
    }

    // --- BOŞVER (SESSİZLİK MODU) FONKSİYONU ---
    function toggleBosver() {
        const container = document.getElementById("mainContainer");
        container.classList.toggle("hidden-mode");
    }

    setInterval(drawCeryan, 33);
    setInterval(updateTimer, 1000);

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
