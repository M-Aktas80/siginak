<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sığınak</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Serin Ceryan Çizgileri */
        .ceryan-hatti {
            position: fixed;
            top: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #45f3ff, transparent);
            animation: akis 3s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }
        .sol-hat { left: 10%; }
        .sag-hat { right: 10%; }

        @keyframes akis {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .container {
            text-align: center;
            z-index: 2;
            max-width: 600px;
            margin-top: 50px;
            width: 100%;
        }

        /* Mum Alanı */
        .mum-alani {
            margin-bottom: 30px;
        }
        .alev {
            width: 15px;
            height: 25px;
            background-color: #ff9d00;
            border-radius: 50% 50% 20% 20%;
            margin: 0 auto;
            box-shadow: 0 0 20px #ff9d00, 0 0 40px #ff5100;
            animation: titreme 0.1s ease-in-out infinite alternate;
        }
        .mum-govde {
            width: 10px;
            height: 40px;
            background-color: #cccccc;
            margin: 0 auto;
            border-radius: 2px;
        }

        @keyframes titreme {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.05) rotate(1deg); opacity: 1; }
        }

        /* Sayaç */
        #sayac {
            font-size: 1.5rem;
            color: #66fcf1;
            text-shadow: 0 0 10px #66fcf1;
            margin-bottom: 40px;
        }

        /* Sözler */
        .soz {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #969798;
        }

        /* Ortak Kutu Tasarımı */
        .siginak-kutusu {
            background: rgba(31, 40, 51, 0.6);
            border: 1px solid #45f3ff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.2);
            width: 100%;
            max-width: 450px;
            margin: 20px auto;
            box-sizing: border-box;
        }
        .siginak-kutusu h3 {
            margin-top: 0;
            font-size: 0.9rem;
            color: #66fcf1;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Not Bırakma Alanı */
        .not-textarea {
            width: 100%;
            height: 80px;
            background: #0b0c10;
            border: 1px solid #c5c6c7;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .not-textarea:focus {
            border-color: #45f3ff;
        }
        .genel-buton {
            background: #45f3ff;
            border: none;
            color: #0b0c10;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            transition: 0.3s;
            width: 100%;
        }
        .genel-buton:hover {
            background: #66fcf1;
            box-shadow: 0 0 10px #66fcf1;
        }
        .not-listesi {
            margin-top: 15px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px dashed #45f3ff;
            padding-top: 10px;
        }
        .not-item {
            background: rgba(11, 12, 16, 0.8);
            padding: 8px;
            margin-bottom: 5px;
            border-left: 3px solid #66fcf1;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        /* Arama Alanı */
        .arama-form {
            display: flex;
            gap: 10px;
        }
        .arama-input {
            flex: 1;
            background: #0b0c10;
            border: 1px solid #c5c6c7;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            outline: none;
        }
        .arama-input:focus {
            border-color: #45f3ff;
        }
        .arama-buton {
            background: #45f3ff;
            border: none;
            color: #0b0c10;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            transition: 0.3s;
        }
        .arama-buton:hover {
            background: #66fcf1;
        }
    </style>
</head>
<body>

    <div class="ceryan-hatti sol-hat"></div>
    <div class="ceryan-hatti sag-hat"></div>

    <div class="container">
        <div class="mum-alani">
            <div class="alev"></div>
            <div class="mum-govde"></div>
        </div>

        <div id="sayac">Yükleniyor...</div>

        <div class="soz">
            "Gördüğün gördüğün gibi, duyduğun duyduğun gibi olmayabilir."
        </div>

        <!-- Sığınak Not Defteri Köşesi -->
        <div class="siginak-kutusu">
            <h3>Sığınak Not Defteri</h3>
            <textarea id="notGirdisi" class="not-textarea" placeholder="Sığınağa dürüst bir not bırak..."></textarea>
            <button onclick="notEkle()" class="genel-buton">Notu Kazı</button>
            <div id="notlar" class="not-listesi"></div>
        </div>

        <!-- DuckDuckGo Arama Kapısı -->
        <div class="siginak-kutusu">
            <h3>Sığınak Arama Kapısı</h3>
            <form class="arama-form" action="https://duckduckgo.com/" method="get" target="_blank">
                <input type="text" name="q" class="arama-input" placeholder="İnternette ara..." required>
                <button type="submit" class="arama-buton">Ara</button>
            </form>
        </div>
    </div>

    <script>
        // Kronometre Fonksiyonu
        function kronometre() {
            const baslangic = new Date("2026-03-26T00:00:00").getTime();
            
            setInterval(() => {
                const simdi = new Date().getTime();
                const fark = simdi - baslangic;

                const gun = Math.floor(fark / (1000 * 60 * 60 * 24));
                const saat = Math.floor((fark % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const dakika = Math.floor((fark % (1000 * 60 * 60)) / (1000 * 60));
                const saniye = Math.floor((fark % (1000 * 60)) / 1000);

                document.getElementById("sayac").innerHTML = 
                    gun + " Gün " + saat + " Saat " + dakika + " Dakika " + saniye + " Saniye";
            }, 1000);
        }

        // Notları Tarayıcıya Kaydetme ve Yükleme
        function notlariYukle() {
            const saklananNotlar = JSON.parse(localStorage.getItem("siginakNotlari")) || [];
            const liste = document.getElementById("notlar");
            liste.innerHTML = "";
            saklananNotlar.reverse().forEach(not => {
                const div = document.createElement("div");
                div.className = "not-item";
                div.innerText = not;
                liste.appendChild(div);
            });
        }

        function notEkle() {
            const metin = document.getElementById("notGirdisi").value.trim();
            if(metin === "") return;

            const saklananNotlar = JSON.parse(localStorage.getItem("siginakNotlari")) || [];
            saklananNotlar.push(metin);
            localStorage.setItem("siginakNotlari", JSON.stringify(saklananNotlar));
            
            document.getElementById("notGirdisi").value = "";
            notlariYukle();
        }

        window.onload = function() {
            kronometre();
            notlariYukle();
        };
    </script>

</body>
</html>
