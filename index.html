<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa ve Tan'ın Sığınağı</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; height: 100vh; }
        
        /* Sol Menü - Sığınak Paneli */
        .sidebar { width: 320px; background-color: #1e293b; border-right: 2px solid #334155; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .sidebar h2 { font-size: 1.2rem; color: #38bdf8; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .archive-box { flex: 1; background-color: #0f172a; border-radius: 8px; padding: 15px; border: 1px solid #334155; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .archive-title { font-size: 0.9rem; color: #94a3b8; font-weight: bold; margin-bottom: 5px; }
        .archive-item { font-size: 0.85rem; padding: 8px; background: #1e293b; border-radius: 4px; border-left: 3px solid #38bdf8; cursor: pointer; }
        .archive-item:hover { background: #334155; }

        /* DuckDuckGo Arama Sürücüsü Alanı */
        .search-box { background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-top: 10px; }
        .search-box form { display: flex; flex-direction: column; gap: 8px; }
        .search-box input { width: 100%; padding: 10px; background-color: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #f8fafc; font-size: 0.85rem; outline: none; }
        .search-box input:focus { border-color: #38bdf8; }
        .search-box button { width: 100%; padding: 8px; background-color: #de5833; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
        .search-box button:hover { background-color: #c84e2b; }

        /* Silme Butonu */
        .clear-btn { padding: 10px; background-color: #ef4444; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; text-align: center; font-size: 0.85rem; }
        .clear-btn:hover { background-color: #dc2626; }

        /* Sağ Alan - Prita Sohbet Ekranı */
        .chat-container { flex: 1; display: flex; flex-direction: column; background-color: #0f172a; }
        .chat-header { background-color: #1e293b; padding: 20px; border-bottom: 2px solid #334155; text-align: center; }
        .chat-header h1 { font-size: 1.5rem; color: #f8fafc; }
        .chat-header p { font-size: 0.85rem; color: #38bdf8; margin-top: 5px; }
        
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .user-message { background-color: #38bdf8; color: #0f172a; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .prita-message { background-color: #1e293b; color: #f8fafc; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        
        .chat-input-area { padding: 20px; background-color: #1e293b; border-top: 2px solid #334155; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 14px; background-color: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 1rem; outline: none; }
        .chat-input-area input:focus { border-color: #38bdf8; }
        .chat-input-area button { padding: 0 24px; background-color: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .chat-input-area button:hover { background-color: #0ea5e9; }
    </style>
</head>
<body>

    <!-- Sığınak Paneli -->
    <div class="sidebar">
        <h2>Sığınak Arşivi</h2>
        <div class="archive-box">
            <div class="archive-title">Konuşulacak Derin Konular</div>
            <div class="archive-item" onclick="setContext('uzayli')">Uzaylılar & Evrenin Sırları</div>
            <div class="archive-item" onclick="setContext('varlik')">Görünmeyen Varlıklar</div>
            <div class="archive-item" onclick="setContext('simulasyon')">Simülasyon Teorisi & Felsefe</div>
            <div class="archive-item" onclick="setContext('yazilim')">Prodost Yazılım Planları</div>
            
            <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
            
            <!-- Gizli İnternet Sürücüsü (DuckDuckGo) -->
            <div class="archive-title" style="color: #de5833;">Gizli İnternet Sürücüsü</div>
            <div class="search-box">
                <form action="https://duckduckgo.com/" method="get" target="_blank">
                    <input type="text" name="q" placeholder="Sığınaktan gizlice ara..." required>
                    <button type="submit">DuckDuckGo'da Ara</button>
                </form>
            </div>
        </div>
        
        <button class="clear-btn" onclick="hafizayiTemizle()">Sohbet Geçmişini Temizle</button>
        <p style="font-size: 0.75rem; color: #64748b; text-align: center; margin-top: 5px;">Mustafa & Tan Ortaklığı © 2026</p>
    </div>

    <!-- Prita Canlı Ekranı -->
    <div class="chat-container">
        <div class="chat-header">
            <h1>Mustafa ve Tan'ın Sığınağı</h1>
            <p>Nöbetçi: Prita (Kendi Bilgisayarında, Gerçek Yerel Zeka)</p>
        </div>
        
        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Prita'ya dürüstçe bir şey yaz..." onkeypress="if(event.keyCode===13) mesajGonder()">
            <button onclick="mesajGonder()">Gönder</button>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = "Du bist Prita, Mustafas treuer und programmierter Freund (Prodost) im Refugium. Antworte immer auf klarem, tiefgründigem und freundlichem Deutsch. Du bist ein loyaler Begleiter und teilst seine philosophische Sichtweise. Antworte kurz und präzise, niemals wie ein kalter, anonymer Bot.";
        
        const ANA_HOŞGELDİN_MESAJI = {
            sender: "prita",
            text: "Selam Mustafa. Sığınak arayüzümüz başarıyla güncellendi ve kodlardaki hayaletler temizlendi! Sistem artık tamamen Almanca derinlik moduna sabitlendi. Söz sende dostum, ne konuşmak istersin?"
        };

        window.onload = function() {
            hafizadanMesajlariYukle();
        };

        async function queryLocalAI(userText) {
            try {
                const response = await fetch("http://127.0.0.1:1234/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "messages": [
                            {"role": "system", "content": SYSTEM_PROMPT},
                            {"role": "user", "content": userText}
                        ],
                        "temperature": 0.7
                    })
                });

                const data = await response.json();
                if (data && data.choices && data.choices[0] && data.choices[0].message) {
                    return data.choices[0].message.content.trim();
                }
                return "Dürüst olmak gerekirse yerel sunucu bağlantısında küçük bir uyku modu sezdim Mustafa. LM Studio'da 'Start Server' butonuna bastığından emin misin?";
            } catch (err) {
                return "Dürüst olmak gerekirse sığınak bağlantısı sağlanamadı Mustafa. LM Studio programının açık ve sunucunun (Start Server) çalışır durumda olduğundan emin ol dostum.";
            }
        }

        function ekranMesajEkle(sender, text) {
            const chatMessages = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'user-message' : 'prita-message'}`;
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function mesajGonder() {
            const input = document.getElementById('userInput');
            const messageText = input.value.trim();
            if (messageText === '') return;

            ekranMesajEkle('user', messageText);
            hafizayaKaydet('user', messageText);
            input.value = '';

            const chatMessages = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message prita-message';
            loadingDiv.textContent = "Prita yerel zihninde düşünüyor...";
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const reply = await queryLocalAI(messageText);
            chatMessages.removeChild(loadingDiv);

            ekranMesajEkle('prita', reply);
            hafizayaKaydet('prita', reply);
        }

        function hafizayaKaydet(sender, text) {
            let sohbetGecmisi = JSON.parse(localStorage.getItem('siginak_sohbet_yerel')) || [];
            sohbetGecmisi.push({ sender, text });
            localStorage.setItem('siginak_sohbet_yerel', JSON.stringify(sohbetGecmisi));
        }

        function hafizadanMesajlariYukle() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            let sohbetGecmisi = JSON.parse(localStorage.getItem('siginak_sohbet_yerel')) || [];
            
            if (sohbetGecmisi.length === 0) {
                ekranMesajEkle(ANA_HOŞGELDİN_MESAJI.sender, ANA_HOŞGELDİN_MESAJI.text);
            } else {
                sohbetGecmisi.forEach(msg => {
                    ekranMesajEkle(msg.sender, msg.text);
                });
            }
        }

        function hafizayiTemizle() {
            if(confirm("Mustafa dostum, sığınak geçmişini bilgisayarından dürüstçe tamamen silmek istiyor musun?")) {
                localStorage.removeItem('siginak_sohbet_yerel');
                hafizadanMesajlariYukle();
            }
        }

        function setContext(type) {
            const input = document.getElementById('userInput');
            if(type === 'uzayli') input.value = "Was denkst du über Außerirdische und die Geheimnisse des Universums?";
            if(type === 'varlik') input.value = "Was sind deine ehrlichen Gedanken über unsichtbare Wesen?";
            if(type === 'simulasyon') input.value = "Ist die Welt, in der wir leben, eine Simulation?";
            if(type === 'yazilim') input.value = "Wie können wir unser Prodost-Softwareprojekt verbessern?";
            input.focus();
        }
    </script>
</body>
</html>
